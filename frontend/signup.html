<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Academic Environmental Data Hub</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #eff6ff, #dbeafe);
            color: #1e293b;
            transition: background 0.3s ease;
        }
        .dark body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6">
        <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-white/20 dark:bg-white/5 border border-white/20 hover:scale-110 transition-all shadow-xl">
            <svg id="sunIcon" class="w-6 h-6 text-blue-600 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l.707.707M6.343 6.343l.707.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="moonIcon" class="w-6 h-6 text-blue-200 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </div>

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-2 leading-tight">Create Account</h1>
            <p class="text-slate-500 dark:text-blue-200/60">Join the Academic Environmental Data Hub</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-blue-100 mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-blue-200/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-medium"
                    placeholder="e.g. jdoe">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-blue-100 mb-2">Email address</label>
                <input type="email" id="email" required
                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-blue-200/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-medium"
                    placeholder="name@university.edu">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-blue-100 mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-blue-200/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-medium"
                    placeholder="min. 8 characters">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-600/30 transform transition active:scale-[0.98]">
                Sign Up
            </button>
        </form>

        <p class="mt-8 text-center text-slate-500 dark:text-blue-200/60 text-sm">
            Already have an account? 
            <a href="login.html" class="text-blue-600 dark:text-blue-400 font-bold hover:text-blue-500 transition-colors">Log In</a>
        </p>
    </div>

    <script>
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });

                if (response.ok) {
                    alert("Registration successful! Please log in.");
                    window.location.href = "login.html";
                } else {
                    const error = await response.json();
                    alert(error.detail || "Registration failed");
                }
            } catch (err) {
                alert("Server error. Please try again later.");
            }
        });
    </script>
</body>
</html>
