<!DOCTYPE html>
<html>
<head>
<title>Environmental Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{margin:0;display:flex;background:#eef1f5}

/* Sidebar */
.sidebar{
width:240px;
background:#1f2937;
color:white;
height:100vh;
padding:25px 20px;
}
.sidebar h2{margin-bottom:30px}
.sidebar a{
display:block;
padding:12px;
color:#d1d5db;
text-decoration:none;
margin-bottom:12px;
border-radius:8px;
transition:.3s;
}
.sidebar a:hover{background:#374151;color:white}

/* Content */
.content{
flex:1;
padding:35px;
}

.header{
font-size:26px;
font-weight:600;
margin-bottom:20px;
color:#111827;
}

/* KPI Cards */
.cards{
display:flex;
gap:20px;
margin-bottom:25px;
}
.card{
background:white;
padding:20px;
flex:1;
border-radius:14px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
text-align:center;
}
.card h3{margin:0;color:#6b7280}
.card p{font-size:24px;font-weight:600;margin-top:8px}

/* Charts */
.chart-container{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
margin-bottom:25px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Env Dashboard</h2>
<a href="dashboard.html">Dashboard</a>
<a href="add_data.html">Add Data</a>
<a href="view_data.html">View Data</a>
</div>

<div class="content">

<div class="header">Environmental Monitoring Dashboard</div>

<div class="cards">
<div class="card">
<h3>Avg Temperature</h3>
<p id="avgTemp">--</p>
</div>

<div class="card">
<h3>Avg Humidity</h3>
<p id="avgHumidity">--</p>
</div>

<div class="card">
<h3>Avg AQI</h3>
<p id="avgAqi">--</p>
</div>
</div>

<div class="chart-container">
<canvas id="tempChart"></canvas>
</div>

<div class="chart-container">
<canvas id="humidityChart"></canvas>
</div>

<div class="chart-container">
<canvas id="aqiChart"></canvas>
</div>

</div>

<script>
fetch("http://127.0.0.1:8000/view-data")
.then(response => response.json())
.then(data => {

const dates = data.map(r => r.date);
const temp = data.map(r => r.temperature);
const humidity = data.map(r => r.humidity);
const aqi = data.map(r => r.aqi);

/* KPI calculation */
document.getElementById("avgTemp").innerText =
(temp.reduce((a,b)=>a+b,0)/temp.length).toFixed(2);

document.getElementById("avgHumidity").innerText =
(humidity.reduce((a,b)=>a+b,0)/humidity.length).toFixed(2);

document.getElementById("avgAqi").innerText =
(aqi.reduce((a,b)=>a+b,0)/aqi.length).toFixed(2);

/* Charts */
new Chart(document.getElementById("tempChart"), {
type: "line",
data: {labels: dates,datasets:[{label:"Temperature",data: temp}]}
});

new Chart(document.getElementById("humidityChart"), {
type: "bar",
data: {labels: dates,datasets:[{label:"Humidity",data: humidity}]}
});

new Chart(document.getElementById("aqiChart"), {
type: "line",
data: {labels: dates,datasets:[{label:"AQI",data: aqi}]}
});

});
</script>

</body>
</html>
