<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Manage User Details</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; transition: background 0.3s ease; }
        .dark body { background: #0f172a; }
        .glass-card { 
            background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.3); 
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sidebar-item-active {
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }
    </style>
</head>
<body class="flex min-h-screen dark:text-slate-100">
    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transition-colors">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div id="sidebarIcon" class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/20">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <span id="sidebarTitle" class="font-bold text-xl text-slate-800 dark:text-white">Admin</span>
            </div>
            <nav class="space-y-2">
                <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all font-medium">
                    <svg width="20" height="20" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Dashboard
                </a>
                <a href="add_data.html" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all font-medium">
                    <svg width="20" height="20" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Data
                </a>
                <a href="view_data.html" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all font-medium">
                    <svg width="20" height="20" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    View Data
                </a>
                <a href="admin_analytics.html" class="flex items-center gap-3 p-3 rounded-xl text-slate-500 hover:bg-slate-50 transition-all font-medium">
                    <svg width="20" height="20" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Analytics
                </a>
                <a href="admin_users.html" class="flex items-center gap-3 p-3 rounded-xl sidebar-item-active font-medium transition-all">
                    <svg width="20" height="20" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Manage User Details
                </a>
            </nav>
        </div>
        <div class="mt-auto p-8 space-y-4">
            <button onclick="toggleTheme()" class="flex items-center gap-3 w-full p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all font-medium">
                <svg id="sunIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l.707.707M6.343 6.343l.707.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="moonIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span class="dark:hidden">Dark Mode</span>
                <span class="hidden dark:block">Light Mode</span>
            </button>
            <button onclick="logout()" class="flex items-center gap-3 w-full p-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 dark:text-white">Manage User Details</h2>
                <p class="text-slate-500 dark:text-slate-400">Add, view, and remove student accounts</p>
            </div>
            <button onclick="document.getElementById('addUserModal').classList.remove('hidden')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center gap-2 shadow-lg shadow-blue-600/20">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add New User
            </button>
        </header>

        <!-- Add User Modal -->
        <div id="addUserModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 max-w-md w-full shadow-2xl transition-colors">
                <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Create New Student</h3>
                <form id="addUserForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-400 mb-1">Username</label>
                        <input type="text" id="newUsername" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-400 mb-1">Email Address</label>
                        <input type="email" id="newEmail" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-400 mb-1">Password</label>
                        <input type="password" id="newPassword" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-medium">
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button type="button" onclick="document.getElementById('addUserModal').classList.add('hidden')" class="flex-1 px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">Cancel</button>
                        <button type="submit" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/10">Create User</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800/50 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 transition-colors">
            <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Registered Students</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 dark:text-slate-500 text-sm uppercase tracking-wider border-b border-slate-100 dark:border-slate-800">
                            <th class="pb-4 font-semibold">Username</th>
                            <th class="pb-4 font-semibold">Email</th>
                            <th class="pb-4 font-semibold">Role</th>
                            <th class="pb-4 font-semibold">Records</th>
                            <th class="pb-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="text-slate-600 dark:text-slate-300">
                        <!-- Content loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";
        
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role !== 'admin') window.location.href = "dashboard.html";

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user "${username}"? This action cannot be undone.`)) return;
            
            try {
                const response = await fetch(`/api/admin/users/${username}`, {
                    method: 'DELETE',
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (response.ok) {
                    loadUsers();
                } else {
                    const error = await response.json();
                    alert(error.detail || "Failed to delete user");
                }
            } catch (err) {
                alert("An error occurred while deleting user");
            }
        }

        document.getElementById('addUserForm').onsubmit = async (e) => {
            e.preventDefault();
            const userData = {
                username: document.getElementById('newUsername').value,
                email: document.getElementById('newEmail').value,
                password: document.getElementById('newPassword').value
            };

            try {
                const response = await fetch("/api/admin/register", {
                    method: 'POST',
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    document.getElementById('addUserModal').classList.add('hidden');
                    document.getElementById('addUserForm').reset();
                    loadUsers();
                } else {
                    const error = await response.json();
                    alert(error.detail || "Failed to add user");
                }
            } catch (err) {
                alert("An error occurred while adding user");
            }
        };

        async function loadUsers() {
            try {
                const response = await fetch("/api/admin/users", {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const userData = await response.json();
                const tbody = document.getElementById('userTableBody');
                
                tbody.innerHTML = userData
                    .filter(u => u.username !== 'admin')
                    .map(u => `
                    <tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50/50 dark:hover:bg-slate-800/50 transition-all">
                        <td class="py-4 font-semibold text-slate-800 dark:text-white">${u.username}</td>
                        <td class="py-4 text-slate-500 dark:text-slate-400 text-sm">${u.email || '-'}</td>
                        <td class="py-4"><span class="px-3 py-1 bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-300 rounded-full text-xs font-bold uppercase">${u.role}</span></td>
                        <td class="py-4 font-medium text-slate-500 dark:text-slate-400 text-sm">${u.record_count}</td>
                        <td class="py-4 text-right">
                            <button onclick="deleteUser('${u.username}')" class="text-red-500 hover:text-red-700 font-bold text-sm transition-all p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg">
                                <svg width="20" height="20" class="inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                alert("Failed to load user details");
            }
        }

        loadUsers();
    </script>
</body>
</html>
